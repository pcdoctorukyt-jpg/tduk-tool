<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDUK Viral Topic Finder</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f3;color:var(--text);font-size:14px;line-height:1.5}
:root{--bg:#fff;--bg2:#f5f5f3;--text:#1a1a18;--text2:#5f5e5a;--text3:#888780;--border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);--radius:8px;--radius-lg:12px;}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--bg2:#242422;--text:#e8e6df;--text2:#a8a69f;--text3:#666461;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);}body{background:#141412}}
.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--bg);border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.sidebar-logo{padding:20px 16px 14px;border-bottom:0.5px solid var(--border)}
.sidebar-logo .brand{font-size:17px;font-weight:700;color:var(--text)}
.sidebar-logo .sub{font-size:11px;color:var(--text3);margin-top:3px}
.nav-section{padding:14px 14px 4px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius);margin:1px 6px;cursor:pointer;color:var(--text2);font-size:13px;transition:background .15s;border:none;background:none;width:calc(100% - 12px);text-align:left}
.nav-item:hover{background:var(--bg2)}
.nav-item.active{background:rgba(24,95,165,0.15);color:#6ab0f5}
.topbar{background:var(--bg);border-bottom:0.5px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:10;backdrop-filter:blur(8px)}
.topbar-title{font-size:16px;font-weight:700;color:var(--text)}
.content{padding:20px 24px;flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:13px;cursor:pointer;transition:background .15s;font-family:inherit;white-space:nowrap;text-decoration:none}
.btn:hover{background:var(--bg2)}
.btn.primary{background:rgba(24,95,165,0.15);color:#6ab0f5;border-color:transparent}
.btn.primary:hover{background:rgba(74,158,47,0.3)}
.btn.success{background:rgba(74,158,47,0.2);color:#7ecf5a;border-color:rgba(74,158,47,0.3)}
.btn.danger{background:#fcebeb;color:#a32d2d;border-color:transparent}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.metric-card{background:var(--bg2);border-radius:var(--radius);padding:14px 16px}
.metric-label{font-size:12px;color:var(--text3);margin-bottom:4px}
.metric-value{font-size:24px;font-weight:700;color:var(--text)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.badge.make-now{background:rgba(74,158,47,0.15);color:#7ecf5a}
.badge.watch{background:rgba(240,160,64,0.2);color:#f0a040}
.badge.ignore{background:var(--bg2);color:var(--text2)}
.badge.policy-risk{background:rgba(224,85,85,0.2);color:#e05555}
.badge.low-risk{background:rgba(74,158,47,0.15);color:#7ecf5a}
.badge.med-risk{background:rgba(240,160,64,0.2);color:#f0a040}
.badge.high-risk{background:rgba(224,85,85,0.2);color:#e05555}
.score-bar{height:6px;border-radius:3px;background:var(--bg2);overflow:hidden}
.score-fill{height:100%;border-radius:3px}
.score-high{background:#7ecf5a}.score-med{background:#ba7517}.score-low{background:#e24b4a}
.video-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:border-color .15s,transform .15s}
.video-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.thumb-wrap{position:relative;background:var(--bg2);aspect-ratio:16/9;overflow:hidden;display:flex;align-items:center;justify-content:center}
.thumb-wrap img{width:100%;height:100%;object-fit:cover}
.thumb-placeholder{font-size:36px}
.score-badge{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.85);color:#7ecf5a;font-size:12px;font-weight:700;padding:3px 8px;border-radius:4px}
.video-info{padding:12px 14px}
.video-title{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--text)}
.video-meta{font-size:11px;color:var(--text3);display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.input{padding:7px 11px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;width:100%}
.input:focus{outline:none;border-color:#185fa5;box-shadow:0 0 0 2px rgba(24,95,165,0.12)}
select.input{cursor:pointer}
.textarea{padding:10px 12px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;width:100%;resize:vertical;min-height:90px}
.textarea:focus{outline:none;border-color:#185fa5}
.form-row{margin-bottom:14px}
.form-label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;font-weight:600}
.section-title{font-size:15px;font-weight:700;margin-bottom:4px;color:var(--text)}
.section-sub{font-size:13px;color:var(--text2);margin-bottom:16px}
.table-wrap{overflow-x:auto;border-radius:var(--radius-lg);border:0.5px solid var(--border)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-size:11px;color:var(--text3);font-weight:700;background:var(--bg2);border-bottom:0.5px solid var(--border);text-transform:uppercase;letter-spacing:0.4px}
td{padding:10px 14px;font-size:13px;border-bottom:0.5px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.modal{background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border);width:100%;max-width:760px;box-shadow:0 8px 40px rgba(0,0,0,0.2)}
.modal-head{padding:18px 22px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-radius:var(--radius-lg) var(--radius-lg) 0 0}
.modal-head h3{font-size:15px;font-weight:700;color:var(--text)}
.modal-body{padding:20px 22px;max-height:75vh;overflow-y:auto}
.modal-footer{padding:14px 22px;border-top:0.5px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.analysis-section{margin-bottom:14px;padding-bottom:14px;border-bottom:0.5px solid var(--border)}
.analysis-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.analysis-label{font-size:10px;font-weight:700;color:#7ecf5a;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px}
.analysis-value{font-size:13px;line-height:1.65;color:var(--text)}
.analysis-list{list-style:none;padding:0}
.analysis-list li{font-size:13px;line-height:1.65;padding:3px 0 3px 16px;color:var(--text);position:relative}
.analysis-list li::before{content:"→";position:absolute;left:0;color:var(--text3)}
.loading-dots::after{content:"...";animation:dots 1.2s steps(3,end) infinite}
@keyframes dots{0%,33%{content:"."}34%,66%{content:".."}67%,100%{content:"..."}}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:44px;margin-bottom:14px}
.empty-text{font-size:15px;font-weight:600;margin-bottom:6px;color:var(--text2)}
.notification{position:fixed;bottom:24px;right:24px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 18px;font-size:13px;z-index:300;box-shadow:0 4px 24px rgba(0,0,0,0.15);max-width:320px;animation:slideIn .2s ease}
@keyframes slideIn{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.banner{border-radius:var(--radius);padding:10px 16px;font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.banner.warn{background:rgba(240,160,64,0.15);border:0.5px solid #f0a040;color:#f0a040}
.banner.info{background:rgba(74,158,47,0.15);border:0.5px solid #4a9e2f;color:#7ecf5a}
.divider{height:0.5px;background:var(--border);margin:16px 0}
.report-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:12px;border-left:3px solid #7ecf5a}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:0.5px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.ch-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;display:flex;align-items:center;gap:14px}
.ch-avatar{width:48px;height:48px;border-radius:50%;background:var(--bg2);object-fit:cover;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px}
.ch-info{flex:1;min-width:0}
.ch-name{font-weight:700;font-size:14px;color:var(--text);margin-bottom:2px}
.ch-meta{font-size:12px;color:var(--text3)}
.progress-bar{height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:#185fa5;border-radius:2px;animation:prog 1.5s ease-in-out infinite}
@keyframes prog{0%{width:10%;margin-left:0}50%{width:50%;margin-left:25%}100%{width:10%;margin-left:90%}}
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="brand">📺 TDUK</div>
      <div class="sub">Viral Topic Finder</div>
    </div>
    <div class="nav-section">Main</div>
    <button class="nav-item active" onclick="showPage('dashboard')" id="nav-dashboard"><span style="width:18px;text-align:center">🏠</span> Dashboard</button>
    <button class="nav-item" onclick="showPage('opportunities')" id="nav-opportunities"><span style="width:18px;text-align:center">🎯</span> Opportunities</button>
    <button class="nav-item" onclick="showPage('report')" id="nav-report"><span style="width:18px;text-align:center">📋</span> Daily Report</button>
    <div class="nav-section">Data</div>
    <button class="nav-item" onclick="showPage('channels')" id="nav-channels"><span style="width:18px;text-align:center">📡</span> Channels</button>
    <button class="nav-item" onclick="showPage('videos')" id="nav-videos"><span style="width:18px;text-align:center">🎬</span> All Videos</button>
    <div class="nav-section">Config</div>
    <button class="nav-item" onclick="showPage('settings')" id="nav-settings"><span style="width:18px;text-align:center">⚙️</span> Settings</button>
    <div style="flex:1"></div>
    <div style="padding:12px 16px;font-size:11px;color:var(--text3);border-top:0.5px solid var(--border)">
      <div id="last-refresh-label">Never refreshed</div>
      <div style="margin-top:2px">TDUK v2.0 — YouTube API</div>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="page-title">Dashboard</div>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="rescoreAll()" id="rescore-btn">🔄 Re-score All</button>
        <button class="btn success" onclick="fetchAllChannels()" id="fetch-all-btn">⬇️ Fetch All Channels</button>
        <button class="btn primary" onclick="showPage('opportunities')">🎯 Opportunities</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<div id="modal-container"></div>
<div id="notification-container"></div>

<script>
// ── STATE ─────────────────────────────────────────────────────────────────────
let state = { channels:[], videos:[], settings:{ claudeApiKey:'', youtubeApiKey:'', lastRefresh:null } };
function loadState(){ try{ const s=localStorage.getItem('tduk_v4'); if(s) state={...state,...JSON.parse(s)}; }catch(e){} }
function saveState(){ try{ localStorage.setItem('tduk_v4',JSON.stringify(state)); }catch(e){} }
loadState();

// ── HELPERS ───────────────────────────────────────────────────────────────────
function esc(s){ return !s?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtNum(n){ n=parseInt(n)||0; if(n>=1000000) return (n/1000000).toFixed(1)+'M'; if(n>=1000) return Math.round(n/1000)+'K'; return n.toString(); }
function videoAge(d){ const h=Math.floor((Date.now()-new Date(d).getTime())/3600000),dy=Math.floor(h/24); if(dy===0) return h+'h ago'; if(dy<7) return dy+'d ago'; if(dy<30) return Math.floor(dy/7)+'w ago'; return Math.floor(dy/30)+'mo ago'; }
function getPolicyRisk(s){ if(s>=70) return {label:'High risk',cls:'high-risk'}; if(s>=35) return {label:'Med risk',cls:'med-risk'}; return {label:'Low risk',cls:'low-risk'}; }
function getFlag(f){ return {'MAKE NOW':{cls:'make-now',icon:'🔥'},WATCH:{cls:'watch',icon:'👀'},'POLICY RISK':{cls:'policy-risk',icon:'⚠️'},IGNORE:{cls:'ignore',icon:'—'}}[f]||{cls:'watch',icon:'👀'}; }
function notify(msg,type='info'){
  const el=document.createElement('div');
  el.className='notification';
  const colors={success:'#7ecf5a',error:'#e05555',info:'#6ab0f5'};
  const bgColors={success:'rgba(74,158,47,0.15)',error:'rgba(224,85,85,0.15)',info:'rgba(106,176,245,0.15)'};
  el.style.cssText=`border-left:3px solid ${colors[type]||colors.info};background:#1e1e1c;color:#e8e6df;box-shadow:0 4px 24px rgba(0,0,0,0.4)`;
  // Add message and close button
  el.innerHTML=`<div style="display:flex;align-items:flex-start;gap:10px;justify-content:space-between">
    <span style="font-size:13px;color:#e8e6df;line-height:1.5">${msg}</span>
    <button onclick="this.parentElement.parentElement.remove()" style="background:none;border:none;color:#888;cursor:pointer;font-size:16px;padding:0;line-height:1;flex-shrink:0">✕</button>
  </div>`;
  document.getElementById('notification-container').appendChild(el);
  // No auto-dismiss - user must close it
}
function updateRefreshLabel(){ const el=document.getElementById('last-refresh-label'); if(el) el.textContent=state.settings.lastRefresh?'Updated: '+new Date(state.settings.lastRefresh).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'Never refreshed'; }
function cleanMd(s){ return s?s.replace(/\*\*([^*]+)\*\*/g,'$1').replace(/\*([^*]+)\*/g,'$1').replace(/^##\s*/gm,'').trim():''; }

// ── SCORING ───────────────────────────────────────────────────────────────────
function scoreVideo(video, channel){
  const avg = channel ? channel.avgViews : 50000;
  const ratio = video.views / avg;
  const ageDays = (Date.now() - new Date(video.uploadDate).getTime()) / 86400000;
  const velocity = video.views / Math.max(ageDays, 0.5);
  const t = video.title.toLowerCase();
  const power = ['changed','happened','reset','back','stopped','update','warning','check','need to know','just','secret','removed','banned','new','amazon','firestick','google tv','android tv','vpn','privacy','settings','alert','exposed','fixed'];
  const generic = ['top 10','best apps','tutorial','beginners guide','how to setup'];
  let relevance = 50;
  if(/(firestick|fire tv|amazon fire|google tv|android tv|streaming device|vpn|privacy)/.test(t)) relevance += 30;
  if(/(kodi|iptv|addon)/.test(t)) relevance += 10;
  let titleStr = 30;
  power.forEach(p=>{ if(t.includes(p)) titleStr += 7; });
  generic.forEach(p=>{ if(t.includes(p)) titleStr -= 12; });
  titleStr = Math.min(100, Math.max(0, titleStr));
  let policyRisk = 5;
  if(/(kodi|iptv|addon pack)/.test(t)) policyRisk = 45;
  if(/(piracy|illegal|free movies|free tv|bypass|cracked|clone)/.test(t)) policyRisk = 85;
  if(/(apk install|downloader code|jailbreak)/.test(t)) policyRisk = 60;
  let vpnPotential = 20;
  if(/(vpn|privacy|tracking|data|isp|throttl)/.test(t)) vpnPotential = 85;
  if(/(streaming|netflix|prime|disney)/.test(t)) vpnPotential = 50;
  const overall = Math.round(
    Math.min(100,ratio*20)*0.25 +
    Math.min(100,(velocity/5000)*100)*0.20 +
    Math.max(0,100-ageDays*4)*0.15 +
    relevance*0.20 + titleStr*0.15 + vpnPotential*0.05
  );
  let flag = 'WATCH';
  if(policyRisk>=70) flag='POLICY RISK';
  else if(overall>=75) flag='MAKE NOW';
  else if(overall<35) flag='IGNORE';
  return { score:overall, flag, scoreBreakdown:{
    viewsVsAvg: Math.round(ratio*10)/10,
    velocity: Math.round(velocity),
    recency: Math.round(Math.max(0,100-ageDays*4)),
    relevance: Math.round(relevance),
    titleStrength: Math.round(titleStr),
    policyRisk: Math.round(policyRisk),
    vpnPotential: Math.round(vpnPotential)
  }};
}

async function fetchAllChannels(){
  if(!state.settings.youtubeApiKey){ notify('Add your YouTube API key in Settings first','error'); return; }
  if(!state.channels.length){ notify('No channels added yet — go to Channels to add some','error'); return; }
  const btn=document.getElementById('fetch-all-btn');
  btn.disabled=true;
  let totalAdded=0, totalUpdated=0, failed=[];
  for(let i=0; i<state.channels.length; i++){
    const ch=state.channels[i];
    btn.textContent=`⬇️ Fetching ${i+1}/${state.channels.length}: ${ch.name}...`;
    try {
      const resp=await fetch('/.netlify/functions/youtube',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'fetchVideos',channelId:ch.youtubeChannelId,apiKey:state.settings.youtubeApiKey})
      });
      const data=await resp.json();
      if(!resp.ok) throw new Error(data.error||'Fetch failed');
      const newVideos=data.videos||[];
      if(newVideos.length>0){
        const avgViews=Math.round(newVideos.reduce((s,v)=>s+v.views,0)/newVideos.length);
        state.channels=state.channels.map(c=>c.id===ch.id?{...c,avgViews}:c);
      }
      newVideos.forEach(v=>{
        const existing=state.videos.find(x=>x.youtubeId===v.youtubeId);
        const scored=scoreVideo(v,ch);
        if(existing){
          state.videos=state.videos.map(x=>x.youtubeId===v.youtubeId?{...x,...v,...scored}:x);
          totalUpdated++;
        } else {
          state.videos.push({id:'v'+Date.now()+Math.random(),channelId:ch.id,channelName:ch.name,transcript:'',analysis:null,...v,...scored});
          totalAdded++;
        }
      });
    } catch(e){
      failed.push(ch.name);
    }
  }
  state.settings.lastRefresh=new Date().toISOString();
  saveState();
  btn.disabled=false;
  btn.textContent='⬇️ Fetch All Channels';
  updateRefreshLabel();
  const failMsg=failed.length?` (${failed.length} failed: ${failed.join(', ')})`:'';
  notify(`✅ Done — ${totalAdded} new videos, ${totalUpdated} updated across ${state.channels.length} channels${failMsg}`,'success');
  showPage(document.querySelector('.nav-item.active')?.id?.replace('nav-','')||'dashboard');
}

function rescoreAll(){
  state.videos = state.videos.map(v=>{ const ch=state.channels.find(c=>c.id===v.channelId); return {...v,...scoreVideo(v,ch)}; });
  state.settings.lastRefresh = new Date().toISOString();
  saveState(); updateRefreshLabel(); notify('All videos re-scored','success');
  showPage(document.querySelector('.nav-item.active')?.id?.replace('nav-','')||'dashboard');
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function showPage(page){
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const nav=document.getElementById('nav-'+page); if(nav) nav.classList.add('active');
  const titles={dashboard:'Dashboard',opportunities:'Top Opportunities',report:'Daily Report',channels:'Competitor Channels',videos:'All Videos',settings:'Settings'};
  document.getElementById('page-title').textContent=titles[page]||page;
  const c=document.getElementById('content'); c.innerHTML=''; c._flagFilter='all';
  ({dashboard:renderDashboard,opportunities:renderOpportunities,report:renderDailyReport,channels:renderChannels,videos:renderVideos,settings:renderSettings})[page]?.(c);
  updateRefreshLabel();
}

// ── VIDEO CARD ────────────────────────────────────────────────────────────────
function videoCard(v){
  const fb=getFlag(v.flag);
  const pr=getPolicyRisk(v.scoreBreakdown?.policyRisk||0);
  const ch=state.channels.find(c=>c.id===v.channelId);
  const ratio=((v.views/(ch?ch.avgViews:50000))).toFixed(1);
  const sc=v.score>=70?'score-high':v.score>=45?'score-med':'score-low';
  return `<div class="video-card">
    <div class="thumb-wrap">
      ${v.thumbnail?`<img src="${esc(v.thumbnail)}" alt="" loading="lazy">`:`<div class="thumb-placeholder">🎬</div>`}
      <div class="score-badge">${v.score}</div>
    </div>
    <div class="video-info">
      <div class="video-title" style="color:var(--text);font-weight:600">${esc(v.title)}</div>
      <div class="video-meta">
        <span>📡 ${esc(v.channelName)}</span>
        <span>👁 ${fmtNum(v.views)}</span>
        <span>🕐 ${videoAge(v.uploadDate)}</span>

window.fetchChannelVideos = async function(channelId){
  if(!state.settings.youtubeApiKey){ notify('Add your YouTube API key in Settings first','error'); return; }
  const ch=state.channels.find(c=>c.id===channelId);
  if(!ch) return;
  const btn=document.getElementById('fetch-btn-'+channelId);
  if(btn){ btn.disabled=true; btn.textContent='⏳ Fetching...'; }
  try {
    const resp=await fetch('/.netlify/functions/youtube',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'fetchVideos',channelId:ch.youtubeChannelId||channelId,apiKey:state.settings.youtubeApiKey})
    });
    const data=await resp.json();
    if(!resp.ok) throw new Error(data.error||'Fetch failed');
    const newVideos=data.videos||[];
    let added=0, updated=0;
    // Calculate channel average from fetched videos
    if(newVideos.length>0){
      const avgViews=Math.round(newVideos.reduce((s,v)=>s+v.views,0)/newVideos.length);
      state.channels=state.channels.map(c=>c.id===channelId?{...c,avgViews}:c);
    }
    newVideos.forEach(v=>{
      const existing=state.videos.find(x=>x.youtubeId===v.youtubeId);
      const scored=scoreVideo(v,ch);
      if(existing){
        state.videos=state.videos.map(x=>x.youtubeId===v.youtubeId?{...x,...v,...scored}:x);
        updated++;
      } else {
        state.videos.push({id:'v'+Date.now()+Math.random(),channelId,channelName:ch.name,transcript:'',analysis:null,...v,...scored});
        added++;
      }
    });
    state.settings.lastRefresh=new Date().toISOString();
    saveState();
    notify(`✅ Fetched ${newVideos.length} videos — ${added} new, ${updated} updated`,'success');
    showPage('channels');
  } catch(e){
    notify('Fetch failed: '+e.message,'error');
    if(btn){ btn.disabled=false; btn.textContent='⬇️ Fetch Latest Videos'; }
  }
};

      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'resolveChannel',channelId:url,apiKey:state.settings.youtubeApiKey})

    document.getElementById('ch-name').value=data.name||'';

};

  const subscribers=parseInt(document.getElementById('ch-subs').value)||0;

  // Get channel ID: manual input takes priority, then auto-resolved

function extractSection(text, label){
  const lines = text.split('\n');
  let result = [], capturing = false;
  const labelUpper = label.toUpperCase();
  for(let i=0; i<lines.length; i++){
    const line = lines[i].trim();
    const lineUpper = line.toUpperCase();
    if(lineUpper.startsWith(labelUpper+':')||lineUpper===labelUpper){
      capturing = true;
      const rest = line.substring(line.indexOf(':')+1).trim();
      if(rest) result.push(rest);
      continue;
    }
    if(capturing){
      // Stop at next section header (all caps line ending with colon)
      if(/^[A-Z0-9 '\-()\/]{4,}:/.test(line) && line===line.toUpperCase().replace(/[^A-Z0-9 ':'\-()\/]/g,'').padEnd(line.length)){
        break;
      }
      if(line) result.push(line);
    }
  }
  return result.map(l=>l.replace(/^[-*\d.]+\s*/,'').trim()).filter(Boolean);
}

function parseStrategyText(text){
  const get=(label)=>extractSection(text,label).join(' ');
  const getList=(label)=>extractSection(text,label);
  return {
    whyWorking: get('WHY IT\'S WORKING'),
    mainHook: get('MAIN HOOK'),
    emotionalTrigger: get('EMOTIONAL TRIGGER'),
    retentionHooks: getList('RETENTION HOOKS'),
    thumbnailStrategy: get('THUMBNAIL STRATEGY'),
    titleStrategy: get('TITLE STRATEGY'),
    riskLevel: get('RISK LEVEL FOR TDUK'),
    tdukAngle: get('BEST TDUK ANGLE'),
    vpnCta: get('VPN CTA ANGLE')
  };
}

function parseTitlesText(text){
  const lines = text.split('\n').map(l=>l.replace(/^[\d.)\-*]+\s*/,'').trim()).filter(Boolean);
  const titleStart = text.toUpperCase().indexOf('5 TDUK TITLE IDEAS');
  const thumbStart = text.toUpperCase().indexOf('5 THUMBNAIL TEXT IDEAS');
  const titleLines=[], thumbLines=[];
  let mode='';
  for(const line of text.split('\n')){
    const u=line.toUpperCase().trim();
    if(u.includes('TITLE IDEAS')) { mode='titles'; continue; }
    if(u.includes('THUMBNAIL TEXT')) { mode='thumbs'; continue; }
    const clean=line.replace(/^[\d.)\-*]+\s*/,'').trim();
    if(!clean) continue;
    if(mode==='titles' && titleLines.length<5) titleLines.push(clean);
    if(mode==='thumbs' && thumbLines.length<5) thumbLines.push(clean);
  }
  return { titleIdeas: titleLines, thumbnailTexts: thumbLines };
}

function parseScriptText(text){
  // Extract the whole script outline as structured sections
  const sections = [];
  const labels = ['Intro (0:00-0:45)','Section 1 (0:45-2:30)','Section 2 (2:30-4:00)','Section 3 (4:00-5:30)','VPN Segment (5:30-6:30)','Outro (6:30-7:30)'];
  for(let i=0; i<labels.length; i++){
    const label = labels[i];
    const nextLabel = labels[i+1];
    const startIdx = text.indexOf(label+':');
    if(startIdx === -1) continue;
    const contentStart = startIdx + label.length + 1;
    const endIdx = nextLabel ? text.indexOf(nextLabel+':') : text.length;
    const sectionText = text.substring(contentStart, endIdx !== -1 ? endIdx : text.length).trim();
    sections.push(label+': '+sectionText);
  }
  return { scriptOutline: sections.join('\n') };
}

function renderAnalysisResult(a, videoId){
  if(!a) return '';
  const sec=(lbl,val,icon)=>{
    const v=val?val.replace(/\*\*([^*]+)\*\*/g,'$1').replace(/\*([^*]+)\*/g,'$1').replace(/^##\s*/gm,'').trim():'';
    return v?`<div class="analysis-section"><div class="analysis-label" style="color:#7ecf5a">${icon} ${lbl}</div><div style="font-size:13px;line-height:1.65;color:var(--text)">${esc(v)}</div></div>`:'';
  };
  const lst=(lbl,items,icon)=>{
    const clean=(items||[]).map(i=>i.replace(/\*\*([^*]+)\*\*/g,'$1').replace(/\*([^*]+)\*/g,'$1').trim()).filter(Boolean);
    return clean.length?`<div class="analysis-section"><div class="analysis-label" style="color:#7ecf5a">${icon} ${lbl}</div><ul class="analysis-list">${clean.map(i=>`<li>${esc(i)}</li>`).join('')}</ul></div>`:'';
  };
  const scriptSection=()=>{
    const outline=a.scriptOutline||'';
    if(!outline) return '';
    const sections=outline.split('\n').filter(Boolean);
    const rows=sections.map(s=>{
      const ci=s.indexOf(':');
      if(ci>0&&ci<45){
        const label=s.substring(0,ci).trim();
        const body=s.substring(ci+1).trim();
        return `<div style="margin-bottom:12px"><div style="font-size:11px;font-weight:700;color:var(--info-text,#185fa5);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.4px">${esc(label)}</div><div style="font-size:13px;line-height:1.65;color:var(--text)">${esc(body)}</div></div>`;
      }
      return `<div style="font-size:13px;line-height:1.65;color:var(--text);margin-bottom:6px">${esc(s)}</div>`;
    }).join('');
    return `<div class="analysis-section"><div class="analysis-label" style="color:#7ecf5a">📋 TDUK script outline</div>${rows}</div>`;
  };
  return `<div style="border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden">
    <div style="display:grid;grid-template-columns:1fr 1fr">
      <div style="padding:16px;border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border)">
        ${sec("Why it's working",a.whyWorking,'📊')}${sec('Main hook',a.mainHook,'🎣')}${sec('Emotional trigger',a.emotionalTrigger,'💡')}${lst('Retention hooks',a.retentionHooks,'🔄')}
      </div>
      <div style="padding:16px;border-bottom:0.5px solid var(--border)">
        ${sec('Thumbnail strategy',a.thumbnailStrategy,'🖼️')}${sec('Title strategy',a.titleStrategy,'✍️')}${sec('Risk level for TDUK',a.riskLevel,'⚠️')}${sec('Best TDUK angle',a.tdukAngle,'🎯')}${sec('VPN CTA angle',a.vpnCta,'🔒')}
      </div>
      <div style="padding:16px;border-right:0.5px solid var(--border)">
        ${lst('5 TDUK title ideas',a.titleIdeas,'📝')}${lst('5 thumbnail text ideas',a.thumbnailTexts,'🎨')}
      </div>
      <div style="padding:16px">
        <div class="analysis-section" style="border-bottom:none">
          <div class="analysis-label" style="color:#7ecf5a">📋 TDUK script outline</div>
          ${!a.scriptOutline ? `
            <div style="text-align:center;padding:20px 0">
              <div style="font-size:13px;color:var(--text2);margin-bottom:14px">Script outline is generated separately so it gets full detail and never gets cut off.</div>
              <button class="btn success" id="script-btn-${videoId}" style="font-size:13px;padding:8px 18px" onclick="generateScriptOutline('${videoId}')">📋 Generate Script Outline</button>
            </div>
            <div id="script-area-${videoId}"></div>
          ` : `
            <div id="script-area-${videoId}">
              ${(()=>{
                const sections=a.scriptOutline.split('\n').filter(Boolean);
                return sections.map(s=>{
                  const ci=s.indexOf(':');
                  if(ci>0&&ci<45){
                    const label=s.substring(0,ci).trim();
                    const body=s.substring(ci+1).trim();
                    return '<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:0.5px solid var(--border)"><div style="font-size:11px;font-weight:700;color:#7ecf5a;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px">'+esc(label)+'</div><div style="font-size:13px;line-height:1.7;color:var(--text)">'+esc(body)+'</div></div>';
                  }
                  return '<div style="font-size:13px;line-height:1.7;color:var(--text);margin-bottom:6px">'+esc(s)+'</div>';
                }).join('');
              })()}
            </div>
          `}
        </div>
      </div>
    </div>
    <div style="padding:10px 16px;border-top:0.5px solid var(--border);display:flex;justify-content:flex-end">
      <button class="btn danger" style="font-size:11px;padding:4px 10px" onclick="clearAnalysis('${videoId}')">🗑 Clear & regenerate</button>
    </div>
  </div>`;
}

window.clearAnalysis=function(videoId){ state.videos=state.videos.map(v=>v.id===videoId?{...v,analysis:null}:v); saveState(); openVideoModal(videoId); };

showPage('dashboard');
</script>
</body>
</html>
