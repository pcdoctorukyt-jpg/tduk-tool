<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDUK Viral Topic Finder</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#141412;color:#e8e6df;font-size:14px;line-height:1.5}
:root{--bg:#1c1c1a;--bg2:#242422;--bg3:#2a2a28;--text:#e8e6df;--text2:#a8a69f;--text3:#666461;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);--green:#7ecf5a;--green-bg:rgba(126,207,90,0.15);--amber:#f0a040;--amber-bg:rgba(240,160,64,0.15);--red:#e05555;--red-bg:rgba(224,85,85,0.15);--blue:#6ab0f5;--blue-bg:rgba(106,176,245,0.15);--radius:8px;--radius-lg:12px}
.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--bg);border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.sidebar-logo{padding:18px 16px 12px;border-bottom:0.5px solid var(--border)}
.sidebar-logo .brand{font-size:17px;font-weight:700;color:var(--text)}
.sidebar-logo .sub{font-size:11px;color:var(--text3);margin-top:2px}
.nav-section{padding:14px 14px 4px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius);margin:1px 6px;cursor:pointer;color:var(--text2);font-size:13px;transition:background .15s;border:none;background:none;width:calc(100% - 12px);text-align:left}
.nav-item:hover{background:var(--bg2)}
.nav-item.active{background:var(--green-bg);color:var(--green)}
.topbar{background:var(--bg);border-bottom:0.5px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:10}
.topbar-title{font-size:15px;font-weight:700;color:var(--text)}
.content{padding:18px 20px;flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 13px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);font-size:13px;cursor:pointer;transition:background .15s;font-family:inherit;white-space:nowrap;text-decoration:none}
.btn:hover{background:var(--bg3)}
.btn.primary{background:var(--green-bg);color:var(--green);border-color:rgba(126,207,90,0.3)}
.btn.primary:hover{background:rgba(126,207,90,0.25)}
.btn.success{background:var(--green-bg);color:var(--green);border-color:rgba(126,207,90,0.3)}
.btn.danger{background:var(--red-bg);color:var(--red);border-color:rgba(224,85,85,0.3)}
.btn.amber{background:var(--amber-bg);color:var(--amber);border-color:rgba(240,160,64,0.3)}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.metric-card{background:var(--bg2);border-radius:var(--radius);padding:12px 14px;border:0.5px solid var(--border)}
.metric-label{font-size:11px;color:var(--text3);margin-bottom:3px}
.metric-value{font-size:20px;font-weight:700;color:var(--green)}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.badge.make-now{background:var(--green-bg);color:var(--green)}
.badge.watch{background:var(--amber-bg);color:var(--amber)}
.badge.ignore{background:var(--bg2);color:var(--text3)}
.badge.policy-risk{background:var(--red-bg);color:var(--red)}
.badge.low-risk{background:var(--green-bg);color:var(--green)}
.badge.med-risk{background:var(--amber-bg);color:var(--amber)}
.badge.high-risk{background:var(--red-bg);color:var(--red)}
.score-bar{height:5px;border-radius:3px;background:var(--bg3);overflow:hidden}
.score-fill{height:100%;border-radius:3px}
.score-high{background:var(--green)}.score-med{background:var(--amber)}.score-low{background:var(--red)}
.video-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:border-color .15s,transform .15s}
.video-card:hover{border-color:var(--green);transform:translateY(-1px)}
.thumb-wrap{position:relative;background:var(--bg2);aspect-ratio:16/9;overflow:hidden;display:flex;align-items:center;justify-content:center}
.thumb-wrap img{width:100%;height:100%;object-fit:cover}
.thumb-placeholder{font-size:32px}
.score-badge{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.85);color:var(--green);font-size:12px;font-weight:700;padding:2px 7px;border-radius:4px}
.spike-badge{position:absolute;top:6px;left:6px;background:rgba(0,0,0,0.85);color:var(--amber);font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px}
.video-info{padding:10px 12px}
.video-title{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--text)}
.video-meta{font-size:11px;color:var(--text3);display:flex;gap:8px;flex-wrap:wrap;margin-bottom:7px}
.input{padding:7px 11px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);font-size:13px;font-family:inherit;width:100%}
.input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 2px var(--green-bg)}
select.input{cursor:pointer}
.textarea{padding:10px 12px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);font-size:13px;font-family:inherit;width:100%;resize:vertical;min-height:80px}
.textarea:focus{outline:none;border-color:var(--green)}
.form-row{margin-bottom:12px}

.table-wrap{overflow-x:auto;border-radius:var(--radius-lg);border:0.5px solid var(--border)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:9px 13px;font-size:11px;color:var(--text3);font-weight:700;background:var(--bg2);border-bottom:0.5px solid var(--border);text-transform:uppercase;letter-spacing:0.4px}
td{padding:9px 13px;font-size:13px;border-bottom:0.5px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto}
.modal{background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border);width:100%;max-width:820px;box-shadow:0 8px 40px rgba(0,0,0,0.4)}

.al{font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px}
.av{font-size:13px;line-height:1.65;color:var(--text)}
.a-sec{margin-bottom:14px;padding-bottom:14px;border-bottom:0.5px solid var(--border)}
.a-sec:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.a-list{list-style:none;padding:0}
.a-list li{font-size:13px;line-height:1.6;padding:2px 0 2px 14px;color:var(--text);position:relative}
.a-list li::before{content:"→";position:absolute;left:0;color:var(--green)}
.loading-dots::after{content:"...";animation:dots 1.2s steps(3,end) infinite}
@keyframes dots{0%,33%{content:"."}34%,66%{content:".."}67%,100%{content:"..."}}
.empty-state{text-align:center;padding:50px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:15px;font-weight:600;margin-bottom:6px;color:var(--text2)}
#notification-container{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px;max-width:340px}
.notification{background:#1e1e1c;border:0.5px solid var(--border2);border-radius:var(--radius);padding:12px 14px;font-size:13px;color:var(--text);box-shadow:0 4px 24px rgba(0,0,0,0.4);animation:slideIn .2s ease}
@keyframes slideIn{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.banner{border-radius:var(--radius);padding:10px 14px;font-size:13px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.banner.warn{background:var(--amber-bg);border:0.5px solid var(--amber);color:var(--amber)}
.banner.info{background:var(--green-bg);border:0.5px solid var(--green);color:var(--green)}
.banner.danger{background:var(--red-bg);border:0.5px solid var(--red);color:var(--red)}
.divider{height:0.5px;background:var(--border);margin:14px 0}
.report-card{background:var(--bg);border:0.5px solid var(--border);border-left:3px solid var(--green);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:10px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:0.5px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.ch-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;display:flex;align-items:center;gap:12px}
.ch-avatar{width:44px;height:44px;border-radius:50%;background:var(--bg2);object-fit:cover;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;border:0.5px solid var(--border)}
.ch-name{font-weight:700;font-size:14px;color:var(--text);margin-bottom:2px}
.ch-meta{font-size:12px;color:var(--text3)}
.progress-bar{height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:var(--green);border-radius:2px;animation:prog 1.5s ease-in-out infinite}
@keyframes prog{0%{width:10%;margin-left:0}50%{width:50%;margin-left:25%}100%{width:10%;margin-left:90%}}
.cluster-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;cursor:pointer;transition:border-color .15s}
.cluster-card:hover{border-color:var(--green)}
.cluster-name{font-weight:700;font-size:14px;color:var(--text);margin-bottom:6px}
.cluster-stat{font-size:12px;color:var(--text3);margin-bottom:2px}
.trend-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border)}
.trend-row:last-child{border-bottom:none}
.trend-rank{font-size:18px;font-weight:700;color:var(--text3);min-width:28px}
.tab-bar{display:flex;gap:4px;margin-bottom:18px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:var(--radius);font-size:13px;cursor:pointer;border:0.5px solid var(--border);background:var(--bg2);color:var(--text2)}
.tab.active{background:var(--green-bg);color:var(--green);border-color:rgba(126,207,90,0.3)}
</style>

<body>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="brand">📺 TDUK</div>
      <div class="sub">Viral Topic Finder v3.0</div>
    </div>
    <div class="nav-section">Main</div>
    <button class="nav-item active" onclick="showPage('dashboard')" id="nav-dashboard"><span style="width:18px;text-align:center">🏠</span> Dashboard</button>
    <button class="nav-item" onclick="showPage('opportunities')" id="nav-opportunities"><span style="width:18px;text-align:center">🎯</span> Opportunities</button>
    <button class="nav-item" onclick="showPage('report')" id="nav-report"><span style="width:18px;text-align:center">📋</span> Daily Report</button>

    <button class="nav-item" onclick="showPage('clusters')" id="nav-clusters"><span style="width:18px;text-align:center">🗂️</span> Topic Clusters</button>
    <button class="nav-item" onclick="showPage('trends')" id="nav-trends"><span style="width:18px;text-align:center">📈</span> Trend Intelligence</button>
    <div class="nav-section">Data</div>
    <button class="nav-item" onclick="showPage('channels')" id="nav-channels"><span style="width:18px;text-align:center">📡</span> Channels</button>
    <button class="nav-item" onclick="showPage('videos')" id="nav-videos"><span style="width:18px;text-align:center">🎬</span> All Videos</button>
    <div class="nav-section">Config</div>
    <button class="nav-item" onclick="showPage('settings')" id="nav-settings"><span style="width:18px;text-align:center">⚙️</span> Settings</button>
    <div style="flex:1"></div>
    <div style="padding:10px 14px;font-size:11px;color:var(--text3);border-top:0.5px solid var(--border)">
      <div id="last-refresh-label">Never refreshed</div>
      <div style="margin-top:2px">TDUK v3.0</div>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="page-title">Dashboard</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn success" onclick="fetchAllChannels()" id="fetch-all-btn">⬇️ Fetch All</button>
        <button class="btn" onclick="rescoreAll()" id="rescore-btn">🔄 Re-score</button>
        <button class="btn primary" onclick="showPage('opportunities')">🎯 Opportunities</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<div id="modal-container"></div>
<div id="notification-container"></div>

<script>
// ── STATE ─────────────────────────────────────────────────────────────────────
let state = {
  channels:[], videos:[],
  settings:{
    claudeApiKey:'', youtubeApiKey:'', lastRefresh:null,
    videosPerChannel:50,
    spikeThreshold:2,
    opportunityThreshold:60,
    freshnessWeight:15,
    trendWeight:20,
    tdukFormulaWeight:25,
    policyRiskWeight:15
  }
};
function loadState(){ try{ const s=localStorage.getItem('tduk_v5'); if(s) state={...state,...JSON.parse(s)}; }catch(e){} }
function saveState(){ try{ localStorage.setItem('tduk_v5',JSON.stringify(state)); }catch(e){} }
loadState();

// ── HELPERS ───────────────────────────────────────────────────────────────────
function esc(s){ return !s?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtNum(n){ n=parseInt(n)||0; if(n>=1000000) return (n/1000000).toFixed(1)+'M'; if(n>=1000) return Math.round(n/1000)+'K'; return n.toString(); }
function videoAge(d){ const h=Math.floor((Date.now()-new Date(d).getTime())/3600000),dy=Math.floor(h/24); if(dy===0) return h+'h ago'; if(dy<7) return dy+'d ago'; if(dy<30) return Math.floor(dy/7)+'w ago'; return Math.floor(dy/30)+'mo ago'; }
function ageDays(d){ return (Date.now()-new Date(d).getTime())/86400000; }
function ageHours(d){ return (Date.now()-new Date(d).getTime())/3600000; }
function getPR(s){ if(s>=70) return {label:'High risk',cls:'high-risk'}; if(s>=35) return {label:'Med risk',cls:'med-risk'}; return {label:'Low risk',cls:'low-risk'}; }
function getFlag(f){ return {'MAKE NOW':{cls:'make-now',icon:'🔥'},WATCH:{cls:'watch',icon:'👀'},'POLICY RISK':{cls:'policy-risk',icon:'⚠️'},IGNORE:{cls:'ignore',icon:'—'}}[f]||{cls:'watch',icon:'👀'}; }
function cleanMd(s){ return s?s.replace(/\*\*([^*]+)\*\*/g,'$1').replace(/\*([^*]+)\*/g,'$1').replace(/^##\s*/gm,'').trim():''; }
function notify(msg,type='info'){
  const el=document.createElement('div'); el.className='notification';
  const c={success:'var(--green)',error:'var(--red)',info:'var(--blue)',warn:'var(--amber)'}[type]||'var(--blue)';
  el.style.borderLeft='3px solid '+c;
  el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px"><span style="color:var(--text);line-height:1.5">${msg}</span><button onclick="this.parentElement.parentElement.remove()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;line-height:1;flex-shrink:0;padding:0">✕</button></div>`;
  document.getElementById('notification-container').appendChild(el);
}
function updateRefreshLabel(){ const el=document.getElementById('last-refresh-label'); if(el) el.textContent=state.settings.lastRefresh?'Updated: '+new Date(state.settings.lastRefresh).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'Never refreshed'; }

// ── TOPIC CLUSTERS ────────────────────────────────────────────────────────────
const CLUSTERS = [
  { id:'amazon-changed', name:'🔄 Amazon Changed', keywords:['amazon changed','amazon added','amazon removed','amazon reset','amazon update','amazon new'] },
  { id:'update-warning', name:'⚠️ Update Warning', keywords:['update warning','new update','important update','firestick update','fire tv update','google tv update','android tv update'] },
  { id:'something-back', name:'🔙 Something Is Back', keywords:['is back','came back','returned','back again','now available'] },
  { id:'stopped-working', name:'🛑 Stopped Working', keywords:['stopped working','not working','broken','fixed','no longer','removed'] },
  { id:'hidden-settings', name:'🔒 Hidden & Privacy', keywords:['hidden setting','secret setting','privacy setting','privacy','data tracking','surveillance'] },
  { id:'vpn', name:'🔐 VPN', keywords:['vpn','virtual private network','isp','ip address'] },
  { id:'kodi', name:'📦 Kodi & Addons', keywords:['kodi','addon','add-on','build','wizard'] },
  { id:'streaming-apps', name:'📺 Streaming Apps', keywords:['app','netflix','prime','disney','plex','jellyfin','stremio','streaming'] },
  { id:'device-comparison', name:'📱 Device Comparison', keywords:['vs','comparison','better than','upgrade','switch','alternative'] },
  { id:'google-tv', name:'📡 Google TV', keywords:['google tv','chromecast','android tv'] },
  { id:'downloader', name:'⬇️ Downloader & APK', keywords:['downloader','apk','sideload','install','code'] },
  { id:'check-now', name:'⚡ Check This Now', keywords:['check this','check now','do this now','must do','users need to know','firestick users'] },
  { id:'other', name:'📌 Other', keywords:[] }
];

function getCluster(title) {
  const t = title.toLowerCase();
  for (const c of CLUSTERS) {
    if (c.id === 'other') continue;
    if (c.keywords.some(k => t.includes(k))) return c.id;
  }
  return 'other';
}

// ── SCORING ENGINE ────────────────────────────────────────────────────────────
const TDUK_BOOST = ['amazon changed','amazon added','amazon removed','amazon reset','update warning','check this now','something happened','is back','firestick users need to know','new firestick','hidden setting','privacy setting','firestick warning','important update','do this now','just changed','just happened','stopped working'];
const TDUK_REDUCE = ['top 10 apps','best apps','tutorial','beginners guide','how to setup','basic settings'];
const POLICY_HIGH = ['piracy','illegal','free movies for free','bypass paid','cracked','cloned app','copyright','streaming site'];
const POLICY_MED = ['kodi','iptv','addon','apk install','downloader code','jailbreak'];

function calcChannelStats(channelId) {
  const vids = state.videos
    .filter(v => v.channelId === channelId && v.views > 0)
    .sort((a,b) => new Date(b.uploadDate) - new Date(a.uploadDate));
  if (!vids.length) return { avg10:0, avg20:0, avg50:0, avgPerDay:0, uploadFreq:0 };
  const avg = (arr) => arr.length ? Math.round(arr.reduce((s,v)=>s+v.views,0)/arr.length) : 0;
  const last10 = vids.slice(0,10).map(v=>v.views);
  const last20 = vids.slice(0,20).map(v=>v.views);
  const last50 = vids.slice(0,50).map(v=>v.views);
  // Upload frequency: days between uploads
  let uploadFreq = 0;
  if (vids.length >= 2) {
    const gaps = [];
    for (let i=0;i<Math.min(vids.length-1,10);i++) {
      gaps.push((new Date(vids[i].uploadDate)-new Date(vids[i+1].uploadDate))/86400000);
    }
    uploadFreq = Math.round(gaps.reduce((s,g)=>s+g,0)/gaps.length*10)/10;
  }
  const avgPerDay = avg(last20) / Math.max(uploadFreq,1);
  return { avg10:avg(last10), avg20:avg(last20), avg50:avg(last50), avgPerDay:Math.round(avgPerDay), uploadFreq };
}

function scoreVideo(video, channel) {
  const stats = calcChannelStats(video.channelId);
  const avg20 = stats.avg20 || channel?.avgViews || 50000;
  const avg10 = stats.avg10 || avg20;
  const hours = Math.max(ageHours(video.uploadDate), 1);
  const days = hours / 24;

  // Spike Score: views vs 20-video avg
  const spikeScore = video.views / avg20;
  // Momentum Score: views vs 10-video avg
  const momentumScore = video.views / Math.max(avg10, 1);
  // Velocity: views per hour
  const velocity = video.views / hours;
  // Freshness Score
  let freshnessScore = 0;
  if (hours < 24) freshnessScore = 100;
  else if (hours < 72) freshnessScore = 80;
  else if (days < 7) freshnessScore = 60;
  else if (days < 14) freshnessScore = 40;
  else if (days < 30) freshnessScore = 20;
  else freshnessScore = Math.max(0, 20 - days);

  // Topic relevance
  const t = video.title.toLowerCase();
  let relevance = 40;
  if (/(firestick|fire tv|amazon fire|google tv|android tv|streaming device|vpn|privacy)/.test(t)) relevance += 35;
  if (/(kodi|iptv|addon)/.test(t)) relevance += 10;

  // TDUK Formula weighting
  let tdukBoost = 0;
  TDUK_BOOST.forEach(k => { if (t.includes(k)) tdukBoost += 12; });
  TDUK_REDUCE.forEach(k => { if (t.includes(k)) tdukBoost -= 10; });
  tdukBoost = Math.min(50, Math.max(-30, tdukBoost));

  // Policy risk
  let policyRisk = 5;
  if (POLICY_MED.some(k => t.includes(k))) policyRisk = 45;
  if (POLICY_HIGH.some(k => t.includes(k))) policyRisk = 85;

  // VPN potential
  let vpnPotential = 20;
  if (/(vpn|privacy|tracking|data|isp|throttl|geo.restrict)/.test(t)) vpnPotential = 85;
  else if (/(streaming|netflix|prime|disney|firestick|fire tv)/.test(t)) vpnPotential = 50;

  // Weighted opportunity score
  const w = state.settings;
  const spikeComponent = Math.min(100, spikeScore * 15);
  const velocityComponent = Math.min(100, (velocity / 3000) * 100);
  const overall = Math.round(
    spikeComponent * 0.30 +
    velocityComponent * ((w.trendWeight||20)/100) +
    freshnessScore * ((w.freshnessWeight||15)/100) +
    relevance * 0.20 +
    Math.min(50,Math.max(0,tdukBoost+25)) * ((w.tdukFormulaWeight||25)/100)
  );

  let flag = 'WATCH';
  if (policyRisk >= 70) flag = 'POLICY RISK';
  else if (overall >= 75 && spikeScore >= (w.spikeThreshold||2)) flag = 'MAKE NOW';
  else if (overall < 30) flag = 'IGNORE';

  // Visual indicators
  let indicator = '';
  if (spikeScore >= 20) indicator = '🚀';
  else if (spikeScore >= 10) indicator = '🔥';
  else if (spikeScore >= 5) indicator = '⭐';
  else if (hours < 72) indicator = '🆕';

  return {
    score: Math.min(100, Math.max(0, overall)),
    flag,
    indicator,
    scoreBreakdown: {
      spikeScore: Math.round(spikeScore*10)/10,
      momentumScore: Math.round(momentumScore*10)/10,
      velocity: Math.round(velocity),
      freshnessScore: Math.round(freshnessScore),
      relevance: Math.round(relevance),
      tdukBoost: Math.round(tdukBoost),
      policyRisk: Math.round(policyRisk),
      vpnPotential: Math.round(vpnPotential),
      avg10, avg20
    }
  };
}

// ── YOUTUBE FETCH ─────────────────────────────────────────────────────────────
async function fetchChannelVideos(channelId){
  if(!state.settings.youtubeApiKey){ notify('Add YouTube API key in Settings first','error'); return; }
  const ch=state.channels.find(c=>c.id===channelId); if(!ch) return;
  const btn=document.getElementById('fetch-btn-'+channelId);
  if(btn){ btn.disabled=true; btn.textContent='⏳ Fetching...'; }
  try {
    const resp=await fetch('/.netlify/functions/youtube',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'fetchVideos',channelId:ch.youtubeChannelId,apiKey:state.settings.youtubeApiKey,maxResults:state.settings.videosPerChannel||50})
    });
    const data=await resp.json();
    if(!resp.ok) throw new Error(data.error||'Fetch failed');
    const newVideos=data.videos||[];
    let added=0,updated=0;
    if(newVideos.length>0){
      const avgViews=Math.round(newVideos.reduce((s,v)=>s+v.views,0)/newVideos.length);
      state.channels=state.channels.map(c=>c.id===channelId?{...c,avgViews}:c);
    }
    newVideos.forEach(v=>{
      const existing=state.videos.find(x=>x.youtubeId===v.youtubeId);
      const scored={...scoreVideo(v,ch),cluster:getCluster(v.title)};
      if(existing){ state.videos=state.videos.map(x=>x.youtubeId===v.youtubeId?{...x,...v,...scored}:x); updated++; }
      else { state.videos.push({id:'v'+Date.now()+Math.random(),channelId,channelName:ch.name,transcript:'',analysis:null,...v,...scored}); added++; }
    });
    state.settings.lastRefresh=new Date().toISOString();
    saveState();
    notify(`✅ ${ch.name}: ${added} new, ${updated} updated`,'success');
    showPage(document.querySelector('.nav-item.active')?.id?.replace('nav-','')||'channels');
  } catch(e){
    notify('Fetch failed: '+e.message,'error');
    if(btn){ btn.disabled=false; btn.textContent='⬇️ Fetch Videos'; }
  }
}

async function fetchAllChannels(){
  if(!state.settings.youtubeApiKey){ notify('Add YouTube API key in Settings first','error'); return; }
  if(!state.channels.length){ notify('No channels added yet','error'); return; }
  const btn=document.getElementById('fetch-all-btn');
  btn.disabled=true;
  let totalAdded=0,totalUpdated=0,failed=[];
  for(let i=0;i<state.channels.length;i++){
    const ch=state.channels[i];
    btn.textContent=`⏳ ${i+1}/${state.channels.length}: ${ch.name}`;
    try {
      const resp=await fetch('/.netlify/functions/youtube',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'fetchVideos',channelId:ch.youtubeChannelId,apiKey:state.settings.youtubeApiKey,maxResults:state.settings.videosPerChannel||50})
      });
      const data=await resp.json();
      if(!resp.ok) throw new Error(data.error);
      const newVideos=data.videos||[];
      if(newVideos.length>0){
        const avgViews=Math.round(newVideos.reduce((s,v)=>s+v.views,0)/newVideos.length);
        state.channels=state.channels.map(c=>c.id===ch.id?{...c,avgViews}:c);
      }
      newVideos.forEach(v=>{
        const existing=state.videos.find(x=>x.youtubeId===v.youtubeId);
        const scored={...scoreVideo(v,ch),cluster:getCluster(v.title)};
        if(existing){ state.videos=state.videos.map(x=>x.youtubeId===v.youtubeId?{...x,...v,...scored}:x); totalUpdated++; }
        else { state.videos.push({id:'v'+Date.now()+Math.random(),channelId:ch.id,channelName:ch.name,transcript:'',analysis:null,...v,...scored}); totalAdded++; }
      });
    } catch(e){ failed.push(ch.name); }
  }
  state.settings.lastRefresh=new Date().toISOString();
  saveState(); updateRefreshLabel();
  btn.disabled=false; btn.textContent='⬇️ Fetch All';
  notify(`✅ Done — ${totalAdded} new, ${totalUpdated} updated${failed.length?' · Failed: '+failed.join(', '):''}`, 'success');
  showPage(document.querySelector('.nav-item.active')?.id?.replace('nav-','')||'dashboard');
}

    const data=await resp.json();
    if(!resp.ok) throw new Error(data.error||'Fetch failed');
    if(data.transcript){
      if(ta) ta.value=data.transcript;
      state.videos=state.videos.map(v=>v.id===videoId?{...v,transcript:data.transcript}:v);
      saveState();
      if(status) status.innerHTML=`<span style="color:var(--green)">✅ Fetched — ${data.transcript.split(' ').length} words</span>`;
      if(btn){btn.textContent='✅ Fetched';}
      notify('Transcript fetched','success');
    } else throw new Error('No transcript found');
  } catch(e){
    if(status) status.innerHTML=`<span style="color:var(--red)">⚠️ ${esc(e.message)}</span>`;
    if(btn){btn.disabled=false;btn.textContent='⬇️ Auto-fetch Transcript';}
  }
};

window.saveTranscript=function(videoId){
  const ta=document.getElementById('ta-'+videoId); if(!ta) return;
  state.videos=state.videos.map(v=>v.id===videoId?{...v,transcript:ta.value.trim()}:v);
  saveState(); notify('Transcript saved','success');
};

window.runAiAnalysis=async function(videoId){
  const v=state.videos.find(x=>x.id===videoId); if(!v) return;
  if(!state.settings.claudeApiKey){ notify('Add Claude API key in Settings first','error'); closeModal(); showPage('settings'); return; }
  const aa=document.getElementById('analysis-area-'+videoId);
  const showStatus=(msg,pct)=>{ if(aa) aa.innerHTML=`<div style="text-align:center;padding:36px 20px"><div style="font-size:32px;margin-bottom:10px">🤖</div><div style="font-weight:700;color:var(--text);margin-bottom:8px">${msg}</div><div style="max-width:220px;margin:0 auto;background:var(--bg2);border-radius:4px;height:5px;overflow:hidden"><div style="height:100%;background:var(--green);border-radius:4px;width:${pct}%;transition:width .4s"></div></div></div>`; };
  const ch=state.channels.find(c=>c.id===v.channelId);
  const avg=v.scoreBreakdown?.avg20||(ch?.avgViews||50000);
  const spike=v.scoreBreakdown?.spikeScore||0;
  const ctx=`Video: "${v.title}" by ${v.channelName}. Views: ${fmtNum(v.views)} (spike: ${spike}× their avg of ${fmtNum(avg)}). Age: ${videoAge(v.uploadDate)}.${v.description?' Desc: '+v.description.substring(0,250):''}.${v.transcript?' Transcript: '+v.transcript.substring(0,600):''}`;
  async function callAI(sys,usr,tok){
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':state.settings.claudeApiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:tok,system:sys,messages:[{role:'user',content:usr}]})});
    const d=await r.json(); if(!r.ok) throw new Error(d.error?.message||'API error '+r.status);
    return d.content?.[0]?.text||'';
  }
  try {
    showStatus('Analysing strategy...', 25);
    const t1=await callAI('You are a YouTube strategy expert for TDUK (Tech Doctor UK), a Firestick/streaming/VPN channel. Be concise and actionable. No markdown asterisks.',
      `Analyse this competitor video for TDUK:\n${ctx}\n\nRespond with exactly these headers:\n\nWHY IT'S WORKING:\nMAIN HOOK:\nEMOTIONAL TRIGGER:\nRETENTION HOOKS:\n- \n- \n- \nTHUMBNAIL STRATEGY:\nTITLE STRATEGY:\nRISK LEVEL FOR TDUK:\nBEST TDUK ANGLE:\nVPN CTA ANGLE:\nESTIMATED FIT SCORE FOR TDUK:\nCOMMENT QUESTION TO ASK:`,600);
    showStatus('Generating titles & thumbnails...', 55);
    const t2=await callAI('YouTube title expert for TDUK (Firestick/VPN channel). Output only the lists. No extra text.',
      `Based on:\n${ctx}\n\n5 TDUK TITLE IDEAS:\n1.\n2.\n3.\n4.\n5.\n\n5 THUMBNAIL TEXT IDEAS:\n1.\n2.\n3.\n4.\n5.`,280);
    showStatus('Writing script outline...', 80);
    const t3=await callAI('YouTube scriptwriter for TDUK (Tech Doctor UK), Firestick/streaming/VPN channel. Write complete, detailed outlines. Every section must have 2-3 sentences of specific detail.',
      `Write a complete 6-8 min TDUK script outline based on:\n${ctx}\n\nUse this exact format with a summary sentence and 3 bullet points per section:\n\nIntro (0:00-0:45):\nSummary: [opening hook sentence]\n• [talking point]\n• [talking point]\n• [talking point]\n\nSection 1 (0:45-2:30):\nSummary: [what this section covers]\n• [talking point]\n• [talking point]\n• [talking point]\n\nSection 2 (2:30-4:00):\nSummary: [what this section covers]\n• [talking point]\n• [talking point]\n• [talking point]\n\nSection 3 (4:00-5:30):\nSummary: [what this section covers]\n• [talking point]\n• [talking point]\n• [talking point]\n\nVPN Segment (5:30-6:30):\nSummary: [how to introduce VPN naturally]\n• [talking point]\n• [talking point]\n• [talking point]\n\nOutro (6:30-7:30):\nSummary: [how to close]\n• [talking point]\n• [talking point]\n• [talking point]`,900);
    showStatus('Done!', 100);
    const parsed={...parseStrategyText(t1),...parseTitlesText(t2),...parseScriptText(t3),raw:t1+'\n'+t2+'\n'+t3};
    state.videos=state.videos.map(v2=>v2.id===videoId?{...v2,analysis:parsed}:v2);
    saveState();
    if(aa) aa.innerHTML=renderAnalysisResult(parsed,videoId);
    notify('Analysis complete!','success');
  } catch(e){
    if(aa) aa.innerHTML=`<div style="text-align:center;padding:20px"><div style="color:var(--red);margin-bottom:12px;font-size:13px">⚠️ ${esc(e.message)}</div><button class="btn primary" onclick="runAiAnalysis('${videoId}')">Try again</button></div>`;
    notify('Failed: '+e.message,'error');
  }
};

function extractSection(text,label){
  const lines=text.split('\n');
  let result=[],capturing=false;
  const lu=label.toUpperCase();
  for(const line of lines){
    const lt=line.trim(),ltu=lt.toUpperCase();
    if(ltu.startsWith(lu+':')||ltu===lu){ capturing=true; const r=lt.substring(lt.indexOf(':')+1).trim(); if(r) result.push(r); continue; }
    if(capturing){ if(/^[A-Z][A-Z0-9 ''\-():\/]{3,}:/.test(lt)) break; if(lt) result.push(lt); }
  }
  return result.map(l=>l.replace(/^[-*\d.]+\s*/,'').trim()).filter(Boolean);
}
function parseStrategyText(text){
  const get=l=>extractSection(text,l).join(' ');
  const gl=l=>extractSection(text,l);
  return {whyWorking:get("WHY IT'S WORKING"),mainHook:get('MAIN HOOK'),emotionalTrigger:get('EMOTIONAL TRIGGER'),retentionHooks:gl('RETENTION HOOKS'),thumbnailStrategy:get('THUMBNAIL STRATEGY'),titleStrategy:get('TITLE STRATEGY'),riskLevel:get('RISK LEVEL FOR TDUK'),tdukAngle:get('BEST TDUK ANGLE'),vpnCta:get('VPN CTA ANGLE'),fitScore:get('ESTIMATED FIT SCORE FOR TDUK'),commentQuestion:get('COMMENT QUESTION TO ASK')};
}
function parseTitlesText(text){
  const titleLines=[],thumbLines=[];
  let mode='';
  for(const line of text.split('\n')){
    const u=line.toUpperCase().trim();
    if(u.includes('TITLE IDEAS')) { mode='t'; continue; }
    if(u.includes('THUMBNAIL TEXT')) { mode='th'; continue; }
    const clean=line.replace(/^[\d.)\-*]+\s*/,'').trim();
    if(!clean) continue;
    if(mode==='t'&&titleLines.length<5) titleLines.push(clean);
    if(mode==='th'&&thumbLines.length<5) thumbLines.push(clean);
  }
  return {titleIdeas:titleLines,thumbnailTexts:thumbLines};
}
function parseScriptText(text){
  const labels=['Intro (0:00-0:45)','Section 1 (0:45-2:30)','Section 2 (2:30-4:00)','Section 3 (4:00-5:30)','VPN Segment (5:30-6:30)','Outro (6:30-7:30)'];
  const sections=[];
  for(let i=0;i<labels.length;i++){
    const label=labels[i],next=labels[i+1];
    const si=text.indexOf(label+':');
    if(si===-1) continue;
    const cs=si+label.length+1;
    const ei=next?text.indexOf(next+':'):text.length;
    const raw=text.substring(cs,ei!==-1?ei:text.length).trim();
    const lines=raw.split('\n').map(l=>l.trim()).filter(Boolean);
    const summary=lines.find(l=>l.toLowerCase().startsWith('summary:'))||'';
    const bullets=lines.filter(l=>l.startsWith('•')||l.startsWith('-'));
    sections.push({label,summary:summary.replace(/^summary:/i,'').trim(),bullets:bullets.map(b=>b.replace(/^[•\-]\s*/,'').trim())});
  }
  return {scriptSections:sections};
}

function renderAnalysisResult(a,videoId){
  if(!a) return '';
  const sec=(lbl,val,icon)=>{ const v=cleanMd(val||''); return v?`<div class="a-sec"><div class="al">${icon} ${lbl}</div><div class="av">${esc(v)}</div></div>`:''; };
  const lst=(lbl,items,icon)=>{ const cl=(items||[]).map(i=>cleanMd(i)).filter(Boolean); return cl.length?`<div class="a-sec"><div class="al">${icon} ${lbl}</div><ul class="a-list">${cl.map(i=>`<li>${esc(i)}</li>`).join('')}</ul></div>`:''; };
  const scriptHtml=()=>{
    if(!a.scriptSections?.length) return '';
    return `<div class="a-sec"><div class="al">📋 TDUK Script Outline</div>
      ${a.scriptSections.map(s=>`<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:0.5px solid var(--border)">
        <div style="font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">${esc(s.label)}</div>
        ${s.summary?`<div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:5px">${esc(s.summary)}</div>`:''}
        ${s.bullets.length?`<ul style="list-style:none;padding:0;margin:0">${s.bullets.map(b=>`<li style="font-size:12px;color:var(--text2);padding:2px 0 2px 14px;position:relative;line-height:1.5"><span style="position:absolute;left:0;color:var(--green)">•</span>${esc(b)}</li>`).join('')}</ul>`:''}
      </div>`).join('')}
    </div>`;
  };
  return `<div style="border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden">
    <div style="display:grid;grid-template-columns:1fr 1fr">
      <div style="padding:14px;border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border)">
        ${sec("Why it's working",a.whyWorking,'📊')}${sec('Main hook',a.mainHook,'🎣')}${sec('Emotional trigger',a.emotionalTrigger,'💡')}${lst('Retention hooks',a.retentionHooks,'🔄')}${sec('Comment question',a.commentQuestion,'💬')}
      </div>
      <div style="padding:14px;border-bottom:0.5px solid var(--border)">
        ${sec('Thumbnail strategy',a.thumbnailStrategy,'🖼️')}${sec('Title strategy',a.titleStrategy,'✍️')}${sec('Risk level',a.riskLevel,'⚠️')}${sec('Best TDUK angle',a.tdukAngle,'🎯')}${sec('VPN CTA angle',a.vpnCta,'🔒')}${a.fitScore?`<div class="a-sec"><div class="al">⚡ Estimated TDUK fit score</div><div style="font-size:22px;font-weight:700;color:var(--green)">${esc(a.fitScore)}</div></div>`:''}
      </div>
      <div style="padding:14px;border-right:0.5px solid var(--border)">
        ${lst('5 TDUK title ideas',a.titleIdeas,'📝')}${lst('5 thumbnail text ideas',a.thumbnailTexts,'🎨')}
      </div>
      <div style="padding:14px">${scriptHtml()}</div>
    </div>
    <div style="padding:9px 14px;border-top:0.5px solid var(--border);display:flex;gap:8px;justify-content:flex-end">
      ${!a.scriptSections?.length?`<button class="btn success" id="script-btn-${videoId}" onclick="generateScriptOutline('${videoId}')">📋 Generate Script Outline</button>`:''}
      <button class="btn danger" style="font-size:11px;padding:4px 9px" onclick="clearAnalysis('${videoId}')">🗑 Clear & regenerate</button>
    </div>
  </div>`;
}

window.generateScriptOutline=async function(videoId){
  const v=state.videos.find(x=>x.id===videoId); if(!v||!v.analysis) return;
  const btn=document.getElementById('script-btn-'+videoId);
  if(btn){btn.disabled=true;btn.textContent='⏳ Writing...';}
  const ch=state.channels.find(c=>c.id===v.channelId);
  const avg=v.scoreBreakdown?.avg20||(ch?.avgViews||50000);
  const ctx=`Video: "${v.title}" by ${v.channelName}. Spike: ${v.scoreBreakdown?.spikeScore||0}× avg of ${fmtNum(avg)}.${v.transcript?' Transcript: '+v.transcript.substring(0,600):''}`;
  try {
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':state.settings.claudeApiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:900,system:'YouTube scriptwriter for TDUK (Firestick/streaming/VPN channel). Write complete detailed outlines. Never leave sections empty.',messages:[{role:'user',content:`Complete 6-8 min TDUK script outline for:\n${ctx}\n\nFor every section: one summary sentence + 3 bullet points:\n\nIntro (0:00-0:45):\nSummary:\n• \n• \n• \n\nSection 1 (0:45-2:30):\nSummary:\n• \n• \n• \n\nSection 2 (2:30-4:00):\nSummary:\n• \n• \n• \n\nSection 3 (4:00-5:30):\nSummary:\n• \n• \n• \n\nVPN Segment (5:30-6:30):\nSummary:\n• \n• \n• \n\nOutro (6:30-7:30):\nSummary:\n• \n• \n• `}]})});
    const d=await r.json(); if(!r.ok) throw new Error(d.error?.message);
    const {scriptSections}=parseScriptText(d.content?.[0]?.text||'');
    const updatedAnalysis={...v.analysis,scriptSections};
    state.videos=state.videos.map(v2=>v2.id===videoId?{...v2,analysis:updatedAnalysis}:v2);
    saveState();
    const aa=document.getElementById('analysis-area-'+videoId);
    if(aa) aa.innerHTML=renderAnalysisResult(updatedAnalysis,videoId);
    notify('Script outline ready!','success');
  } catch(e){
    if(btn){btn.disabled=false;btn.textContent='📋 Generate Script Outline';}
    notify('Script failed: '+e.message,'error');
  }
};

window.clearAnalysis=function(videoId){
  state.videos=state.videos.map(v=>v.id===videoId?{...v,analysis:null}:v);
  saveState(); openVideoModal(videoId);
};

showPage('dashboard');
</script>
